version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: groweasy-csv-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: groweasy-csv-importer
    volumes:
      - mongodb_data:/data/db
    networks:
      - groweasy-csv-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groweasy-csv-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/groweasy-csv-importer?authSource=admin
      JWT_SECRET: development-secret-key
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - groweasy-csv-network

  # User Frontend
  user-frontend:
    build:
      context: ./user-frontend
      dockerfile: Dockerfile
    container_name: groweasy-csv-user-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./user-frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - groweasy-csv-network

  # Admin Frontend
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: groweasy-csv-admin-frontend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      PORT: 3002
    depends_on:
      - backend
    volumes:
      - ./admin-frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - groweasy-csv-network

volumes:
  mongodb_data:

networks:
  groweasy-csv-network:
    driver: bridge
